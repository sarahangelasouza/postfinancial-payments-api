$kind: http-request
url: "{{baseUrl}}/api/v1/payments/pay_001/confirm"
method: PUT
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      })


      pm.test('Content-Type header is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      })


      pm.test('Response body matches confirmed payment schema', function () {
          pm.response.to.have.jsonSchema(confirmedPaymentSchema);
      })


      pm.test('Response contains all required fields', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('id');
          pm.expect(jsonData).to.have.property('amount');
          pm.expect(jsonData).to.have.property('currency');
          pm.expect(jsonData).to.have.property('status');
          pm.expect(jsonData).to.have.property('createdAt');
          pm.expect(jsonData).to.have.property('confirmedAt');
      })


      pm.test('All fields have correct data types', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a('string');
          pm.expect(jsonData.amount).to.be.a('number');
          pm.expect(jsonData.currency).to.be.a('string');
          pm.expect(jsonData.status).to.be.a('string');
          pm.expect(jsonData.createdAt).to.be.a('string');
          pm.expect(jsonData.confirmedAt).to.be.a('string');
          if (jsonData.updatedAt) {
              pm.expect(jsonData.updatedAt).to.be.a('string');
          }
          if (jsonData.customerId) {
              pm.expect(jsonData.customerId).to.be.a('string');
          }
      })


      pm.test('Payment status is confirmed or processing', function () {
          const validStatuses = [
              'confirmed',
              'processing',
              'completed'
          ];
          const jsonData = pm.response.json();
          pm.expect(validStatuses).to.include(jsonData.status);
      })


      pm.test('Payment ID format is valid', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.match(/^pay_/);
      })


      pm.test('ConfirmedAt is a valid ISO 8601 date string', function () {
          const jsonData = pm.response.json();
          const date = new Date(jsonData.confirmedAt);
          pm.expect(date.toString()).to.not.equal('Invalid Date');
      })


      pm.test('ConfirmedAt is after or equal to createdAt', function () {
          const jsonData = pm.response.json();
          const createdDate = new Date(jsonData.createdAt);
          const confirmedDate = new Date(jsonData.confirmedAt);
          pm.expect(confirmedDate.getTime()).to.be.at.least(createdDate.getTime());
      })
    language: text/javascript
examples: ./.resources/Confirm Payment.resources/examples
order: 5000
