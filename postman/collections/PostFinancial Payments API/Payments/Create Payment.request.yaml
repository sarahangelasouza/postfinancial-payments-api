$kind: http-request
url: "{{baseUrl}}/api/v1/payments"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "customerId": "cust_001",
      "amount": 99.99,
      "currency": "USD",
      "method": "credit_card",
      "description": "Test payment"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      })


      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      })


      pm.test('Content-Type header is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      })


      pm.test('Response body matches payment schema', function () {
          pm.response.to.have.jsonSchema(paymentSchema);
      })


      pm.test('Response contains all required fields', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('id');
          pm.expect(jsonData).to.have.property('amount');
          pm.expect(jsonData).to.have.property('currency');
          pm.expect(jsonData).to.have.property('status');
          pm.expect(jsonData).to.have.property('createdAt');
      })


      pm.test('All fields have correct data types', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.be.a('string');
          pm.expect(jsonData.amount).to.be.a('number');
          pm.expect(jsonData.currency).to.be.a('string');
          pm.expect(jsonData.status).to.be.a('string');
          pm.expect(jsonData.createdAt).to.be.a('string');
          if (jsonData.customerId) {
              pm.expect(jsonData.customerId).to.be.a('string');
          }
          if (jsonData.paymentMethod) {
              pm.expect(jsonData.paymentMethod).to.be.a('string');
          }
          if (jsonData.clientSecret) {
              pm.expect(jsonData.clientSecret).to.be.a('string');
          }
      })


      pm.test('Payment status is pending or requires_confirmation', function ()
      {
          const validStatuses = [
              'pending',
              'requires_confirmation',
              'processing'
          ];
          const jsonData = pm.response.json();
          pm.expect(validStatuses).to.include(jsonData.status);
      })


      pm.test('Payment ID format is valid (starts with pay_)', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.match(/^pay_/);
      })


      pm.test('CreatedAt is a valid ISO 8601 date string', function () {
          const jsonData = pm.response.json();
          const date = new Date(jsonData.createdAt);
          pm.expect(date.toString()).to.not.equal('Invalid Date');
      })


      pm.test('Payment amount matches request amount', function () {
          const requestBody = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.amount).to.equal(requestBody.amount);
      })


      pm.test('Payment currency matches request currency', function () {
          const requestBody = JSON.parse(pm.request.body.raw);
          const jsonData = pm.response.json();
          pm.expect(jsonData.currency).to.equal(requestBody.currency);
      })
    language: text/javascript
examples: ./.resources/Create Payment.resources/examples
order: 4000
