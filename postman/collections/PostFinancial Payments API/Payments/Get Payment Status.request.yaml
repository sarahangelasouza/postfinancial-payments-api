$kind: http-request
url: "{{baseUrl}}/api/v1/payments/pay_001/status"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('Response time is less than 2000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      })


      pm.test('Content-Type header is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      })


      pm.test('Response body matches payment status schema', function () {
          pm.response.to.have.jsonSchema(paymentStatusSchema);
      })


      pm.test('Response contains all required fields', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('paymentId');
          pm.expect(jsonData).to.have.property('status');
          pm.expect(jsonData).to.have.property('updatedAt');
      })


      pm.test('All fields have correct data types', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.paymentId).to.be.a('string');
          pm.expect(jsonData.status).to.be.a('string');
          pm.expect(jsonData.updatedAt).to.be.a('string');
          if (jsonData.statusHistory) {
              pm.expect(jsonData.statusHistory).to.be.an('array');
              jsonData.statusHistory.forEach(function (entry, index) {
                  pm.expect(entry.status).to.be.a('string', `History ${ index }: status should be string`);
                  pm.expect(entry.timestamp).to.be.a('string', `History ${ index }: timestamp should be string`);
              });
          }
          if (jsonData.failureReason !== null && jsonData.failureReason !== undefined) {
              pm.expect(jsonData.failureReason).to.be.a('string');
          }
      })


      pm.test('Payment status is a valid value', function () {
          const validStatuses = [
              'pending',
              'processing',
              'completed',
              'failed',
              'cancelled',
              'refunded',
              'requires_confirmation',
              'requires_action'
          ];
          const jsonData = pm.response.json();
          pm.expect(validStatuses).to.include(jsonData.status);
      })


      pm.test('Payment ID format is valid', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.paymentId).to.match(/^pay_/);
      })


      pm.test('UpdatedAt is a valid ISO 8601 date string', function () {
          const jsonData = pm.response.json();
          const date = new Date(jsonData.updatedAt);
          pm.expect(date.toString()).to.not.equal('Invalid Date');
      })


      pm.test('Status history entries have valid timestamps', function () {
          const jsonData = pm.response.json();
          if (jsonData.statusHistory && jsonData.statusHistory.length > 0) {
              jsonData.statusHistory.forEach(function (entry, index) {
                  const date = new Date(entry.timestamp);
                  pm.expect(date.toString()).to.not.equal('Invalid Date', `History ${ index }: invalid timestamp`);
              });
          }
      })


      pm.test('Status history statuses are valid values', function () {
          const validStatuses = [
              'pending',
              'processing',
              'completed',
              'failed',
              'cancelled',
              'refunded',
              'requires_confirmation',
              'requires_action'
          ];
          const jsonData = pm.response.json();
          if (jsonData.statusHistory && jsonData.statusHistory.length > 0) {
              jsonData.statusHistory.forEach(function (entry, index) {
                  pm.expect(validStatuses).to.include(entry.status, `History ${ index }: invalid status value`);
              });
          }
      })
    language: text/javascript
examples: ./.resources/Get Payment Status.resources/examples
order: 3000
