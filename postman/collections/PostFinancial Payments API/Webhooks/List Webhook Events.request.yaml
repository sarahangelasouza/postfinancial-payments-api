$kind: http-request
url: "{{baseUrl}}/api/v1/webhooks/events"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })


      pm.test('Response has data array', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('data');
          pm.expect(jsonData.data).to.be.an('array');
      })


      pm.test('Response has total count', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('total');
          pm.expect(jsonData.total).to.be.a('number');
      })


      pm.test('Each event has required fields', function () {
          const jsonData = pm.response.json();
          jsonData.data.forEach(function (event) {
              pm.expect(event).to.have.property('id');
              pm.expect(event).to.have.property('type');
              pm.expect(event).to.have.property('data');
              pm.expect(event).to.have.property('createdAt');
          });
      })


      pm.test('Event IDs have correct format (evt_*)', function () {
          const jsonData = pm.response.json();
          jsonData.data.forEach(function (event) {
              pm.expect(event.id).to.match(/^evt_/);
          });
      })


      pm.test('Events are sorted by created_at descending', function () {
          const jsonData = pm.response.json();
          if (jsonData.data.length > 1) {
              for (let i = 0; i < jsonData.data.length - 1; i++) {
                  const currentDate = new Date(jsonData.data[i].createdAt);
                  const nextDate = new Date(jsonData.data[i + 1].createdAt);
                  pm.expect(currentDate.getTime()).to.be.at.least(nextDate.getTime());
              }
          }
      })
    language: text/javascript
examples: ./.resources/List Webhook Events.resources/examples
order: 2000
