$kind: http-request
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response time is less than 500ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(500);
      })

      pm.test('Response has valid JSON schema', function () {
          const schema = {
              type: 'object',
              required: [
                  'status',
                  'timestamp',
                  'version',
                  'service'
              ],
              properties: {
                  status: { type: 'string' },
                  timestamp: { type: 'string' },
                  version: { type: 'string' },
                  service: { type: 'string' }
              }
          };
          pm.response.to.have.jsonSchema(schema);
      })

      pm.test('Status should be healthy', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.status).to.eql('healthy');
      })

      pm.test('Timestamp is valid ISO 8601 format', function () {
          const jsonData = pm.response.json();
          const timestamp = new Date(jsonData.timestamp);
          pm.expect(timestamp.toString()).to.not.eql('Invalid Date');
      })

      pm.test('Version follows semantic versioning format', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.version).to.match(/^\d+\.\d+\.\d+$/);
      })
    language: text/javascript
examples: ./.resources/Get API Health.resources/examples
order: 1000
