schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/refunds"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "paymentId": "{{paymentId}}",  // Change from "pay_001"
      "amount": 99.99,
      "reason": "Customer request"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 201", () => {
          pm.response.to.have.status(201);
      });


      pm.test("Response time is under 1000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Created refund has required fields", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("paymentId");
          pm.expect(jsonData).to.have.property("amount");
          pm.expect(jsonData).to.have.property("reason");
          pm.expect(jsonData).to.have.property("status");
          pm.expect(jsonData).to.have.property("createdAt");
      });


      pm.test("New refund ID format is valid", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.match(/^ref_/);
      });


      pm.test("New refund status is pending", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.status).to.equal("pending");
      });


      pm.test("Amount matches request", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.amount).to.equal(99.99);
      });


      pm.test("Payment ID matches request", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.paymentId).to.equal(pm.environment.get("paymentId"));
      });


      // Store refund ID for subsequent requests

      pm.collectionVariables.set("createdRefundId", pm.response.json().id);
    language: text/javascript
examples: ./.resources/Create Refund.resources/examples
order: 3000
