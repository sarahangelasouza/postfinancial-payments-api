schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/refunds/{{refundId}}/reject"
method: PUT
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200 or 404", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      if (pm.response.code === 200) {
          pm.test("Rejected refund has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("status");
              pm.expect(jsonData).to.have.property("rejectedAt");
          });

          pm.test("Refund status is rejected", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.status).to.equal("rejected");
          });
      }


      if (pm.response.code === 404) {
          pm.test("Error response has error field", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
          });

          pm.test("Error indicates refund not found", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.error).to.equal("Refund not found");
          });
      }
    language: text/javascript
examples: ./.resources/Reject Refund.resources/examples
order: 5000
