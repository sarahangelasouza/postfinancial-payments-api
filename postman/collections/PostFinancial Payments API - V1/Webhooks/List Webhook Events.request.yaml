schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/webhooks/events"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is under 1000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response has required fields", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("data");
          pm.expect(jsonData).to.have.property("total");
      });


      pm.test("Data is an array", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.data).to.be.an("array");
      });


      pm.test("Webhook event objects have required fields", () => {
          const jsonData = pm.response.json();
          if (jsonData.data.length > 0) {
              const event = jsonData.data[0];
              pm.expect(event).to.have.property("id");
              pm.expect(event).to.have.property("type");
              pm.expect(event).to.have.property("data");
              pm.expect(event).to.have.property("timestamp");
          }
      });


      pm.test("Event ID format is valid", () => {
          const jsonData = pm.response.json();
          if (jsonData.data.length > 0) {
              pm.expect(jsonData.data[0].id).to.match(/^evt_/);
          }
      });
    language: text/javascript
examples: ./.resources/List Webhook Events.resources/examples
order: 2000
