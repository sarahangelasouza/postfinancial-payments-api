schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/webhooks"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "payment.completed",
      "data": {
        "paymentId": "pay_001",
        "amount": 99.99
      }
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response has required fields", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("received");
          pm.expect(jsonData).to.have.property("eventId");
      });


      pm.test("Received flag is true", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.received).to.equal(true);
      });


      pm.test("Event ID format is valid", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.eventId).to.match(/^evt_/);
      });
    language: text/javascript
examples: ./.resources/Receive Webhook Event.resources/examples
order: 3000
