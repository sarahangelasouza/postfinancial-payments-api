schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/webhooks/events/{{webhookEventId}}"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200 or 404", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      if (pm.response.code === 200) {
          pm.test("Webhook event has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("type");
              pm.expect(jsonData).to.have.property("data");
              pm.expect(jsonData).to.have.property("timestamp");
          });

          pm.test("Event ID format is valid", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.id).to.match(/^evt_/);
          });

          pm.test("Event data has payment info", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.data).to.have.property("paymentId");
              pm.expect(jsonData.data).to.have.property("amount");
          });
      }


      if (pm.response.code === 404) {
          pm.test("Error response has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
              pm.expect(jsonData).to.have.property("message");
          });

          pm.test("Error indicates event not found", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.error).to.equal("Event not found");
          });
      }
    language: text/javascript
examples: ./.resources/Get Webhook Event by ID.resources/examples
order: 1000
