schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: >-
      // Status code validation

      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });


      // Response time check

      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      // Header validation

      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      // Response structure validation

      pm.test("Response has required fields", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("status");
          pm.expect(jsonData).to.have.property("timestamp");
          pm.expect(jsonData).to.have.property("service");
          pm.expect(jsonData).to.have.property("version");
      });


      // Data type validation

      pm.test("Field types are correct", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.status).to.be.a("string");
          pm.expect(jsonData.timestamp).to.be.a("string");
          pm.expect(jsonData.service).to.be.a("string");
          pm.expect(jsonData.version).to.be.a("string");
      });


      // Business logic validation

      pm.test("Service status is healthy", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.status).to.equal("healthy");
          pm.expect(jsonData.service).to.equal("PostFinancial Payments API");
      });
    language: text/javascript
examples: ./.resources/Get API Health.resources/examples
order: 1000
