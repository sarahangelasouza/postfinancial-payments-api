schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/payments/{{paymentId}}/cancel"
method: PUT
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200 or 400", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 400]);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      if (pm.response.code === 200) {
          pm.test("Cancelled payment has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("status");
          });

          pm.test("Payment status is cancelled", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.status).to.equal("cancelled");
          });
      }


      if (pm.response.code === 400) {
          pm.test("Error response has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
              pm.expect(jsonData).to.have.property("message");
          });

          pm.test("Error indicates invalid operation", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.error).to.equal("Invalid operation");
          });
      }
    language: text/javascript
examples: ./.resources/Cancel Payment.resources/examples
order: 6000
