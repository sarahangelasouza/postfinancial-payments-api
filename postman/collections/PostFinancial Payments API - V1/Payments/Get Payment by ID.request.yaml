schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/payments/{{paymentId}}"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response has required payment fields", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("customerId");
          pm.expect(jsonData).to.have.property("amount");
          pm.expect(jsonData).to.have.property("currency");
          pm.expect(jsonData).to.have.property("status");
          pm.expect(jsonData).to.have.property("method");
          pm.expect(jsonData).to.have.property("createdAt");
          pm.expect(jsonData).to.have.property("updatedAt");
      });


      pm.test("Field types are correct", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.amount).to.be.a("number");
          pm.expect(jsonData.currency).to.be.a("string");
          pm.expect(jsonData.status).to.be.a("string");
      });


      pm.test("Payment ID matches request", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.id).to.equal(pm.environment.get("paymentId"));
      });


      pm.test("Status is valid payment status", () => {
          const jsonData = pm.response.json();
          const validStatuses = ["pending", "completed", "cancelled", "failed"];
          pm.expect(validStatuses).to.include(jsonData.status);
      });
    language: text/javascript
examples: ./.resources/Get Payment by ID.resources/examples
order: 2000
