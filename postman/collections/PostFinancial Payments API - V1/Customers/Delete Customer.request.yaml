schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/customers/{{customerId}}"
method: DELETE
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200 or 400", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 400]);
      });


      pm.test("Response time is under 500ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      if (pm.response.code === 200) {
          pm.test("Success message is returned", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("message");
              pm.expect(jsonData.message).to.include("deleted");
          });
      }


      if (pm.response.code === 400) {
          pm.test("Error response has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
              pm.expect(jsonData).to.have.property("message");
          });

          pm.test("Error indicates customer has payments", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.error).to.equal("Cannot delete customer");
              pm.expect(jsonData.message).to.include("payments");
          });
      }
    language: text/javascript
examples: ./.resources/Delete Customer.resources/examples
order: 6000
