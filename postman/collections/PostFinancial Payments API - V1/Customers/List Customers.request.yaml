schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/customers?limit=20&offset=0"
method: GET
queryParams:
  limit: "20"
  offset: "0"
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", () => {
          pm.response.to.have.status(200);
      });


      pm.test("Response time is under 1000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      pm.test("Response has pagination structure", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("data");
          pm.expect(jsonData).to.have.property("total");
          pm.expect(jsonData).to.have.property("limit");
          pm.expect(jsonData).to.have.property("offset");
      });


      pm.test("Data is an array", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData.data).to.be.an("array");
      });


      pm.test("Customer objects have required fields", () => {
          const jsonData = pm.response.json();
          if (jsonData.data.length > 0) {
              const customer = jsonData.data[0];
              pm.expect(customer).to.have.property("id");
              pm.expect(customer).to.have.property("email");
              pm.expect(customer).to.have.property("name");
              pm.expect(customer).to.have.property("createdAt");
          }
      });


      pm.test("Customer ID format is valid", () => {
          const jsonData = pm.response.json();
          if (jsonData.data.length > 0) {
              pm.expect(jsonData.data[0].id).to.match(/^cust_/);
          }
      });
    language: text/javascript
examples: ./.resources/List Customers.resources/examples
order: 1000
