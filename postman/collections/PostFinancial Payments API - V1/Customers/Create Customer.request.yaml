schemaVersion: "3.0"
type: http
url: "{{baseUrl}}/api/v1/customers"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "customer@example.com",
      "name": "John Doe",
      "phone": "+1-555-0123"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 201 or 409", () => {
          pm.expect(pm.response.code).to.be.oneOf([201, 409]);
      });


      pm.test("Response time is under 1000ms", () => {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });


      pm.test("Content-Type is application/json", () => {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });


      if (pm.response.code === 201) {
          pm.test("Created customer has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("email");
              pm.expect(jsonData).to.have.property("name");
              pm.expect(jsonData).to.have.property("createdAt");
              pm.expect(jsonData).to.have.property("totalSpent");
          });

          pm.test("New customer ID format is valid", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.id).to.match(/^cust_/);
          });

          pm.test("New customer totalSpent is 0", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.totalSpent).to.equal(0);
          });
      }


      if (pm.response.code === 409) {
          pm.test("Error response has required fields", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("error");
              pm.expect(jsonData).to.have.property("message");
          });

          pm.test("Error indicates duplicate customer", () => {
              const jsonData = pm.response.json();
              pm.expect(jsonData.error).to.equal("Customer already exists");
          });
      }
    language: text/javascript
examples: ./.resources/Create Customer.resources/examples
order: 4000
